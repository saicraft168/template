services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # node_modulesはコンテナ側に保持
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      # API呼び出しはViteのproxyで /api → backend:8080 へ流す想定
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    networks:
      - appnet

  backend:
    build:
      context: ./backend_springboot
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}
      - SPRING_DATASOURCE_USERNAME=${PG_USER}
      - SPRING_DATASOURCE_PASSWORD=${PG_PASSWORD}
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "8080:8080"
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

networks:
  appnet:
    driver: bridge

volumes:
  frontend_node_modules:
